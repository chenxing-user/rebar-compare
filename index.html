<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>钢筋一二审对比表</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Arial', 'Microsoft YaHei', sans-serif;
    background: #f0f2f5;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px;
  }
  .header { text-align: center; margin-bottom: 32px; }
  .header h1 { font-size: 24px; color: #1a3a6b; font-weight: 700; letter-spacing: 1px; }
  .header p { font-size: 13px; color: #888; margin-top: 6px; }

  .upload-area {
    display: flex; gap: 24px;
    width: 100%; max-width: 900px; margin-bottom: 24px;
  }
  .file-card {
    flex: 1; background: white; border-radius: 12px; padding: 24px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.07);
    border: 2px dashed #d0d9e8; transition: all 0.2s;
  }
  .file-card.dragover { border-color: #2F5496; box-shadow: 0 0 0 3px rgba(47,84,150,0.15); }
  .file-card.uploaded { border-color: #70AD47; border-style: solid; }
  .file-card h3 { font-size: 14px; color: #2F5496; margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
  .file-card input[type="file"] { display: none; }
  .drop-zone {
    border: 1px dashed #c0cfe0; border-radius: 8px; padding: 32px 16px;
    text-align: center; cursor: pointer; transition: background 0.2s;
  }
  .drop-zone:hover { background: #f0f7ff; }
  .drop-zone .big-icon { font-size: 32px; display: block; margin-bottom: 8px; }
  .drop-zone .hint { font-size: 13px; color: #999; }
  .drop-zone .fname { font-size: 14px; font-weight: 600; color: #2F5496; margin-top: 8px; word-break: break-all; display: none; }
  .file-info { margin-top: 10px; font-size: 12px; color: #70AD47; display: none; align-items: center; gap: 4px; }

  .btn-row { display: flex; gap: 12px; margin-bottom: 28px; justify-content: center; }
  button { padding: 12px 32px; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
  .btn-primary { background: #2F5496; color: white; }
  .btn-primary:hover { background: #1a3a6b; }
  .btn-primary:disabled { background: #aabbcc; cursor: not-allowed; }
  .btn-secondary { background: white; color: #555; border: 1px solid #ddd; }
  .btn-secondary:hover { background: #f5f5f5; }

  .error-msg {
    background: #fff2f0; border: 1px solid #ffccc7; border-radius: 8px;
    padding: 12px 16px; color: #cf1322; font-size: 13px;
    max-width: 900px; width: 100%; margin-bottom: 16px; display: none;
  }

  /* 结果 */
  .result-wrap {
    width: 100%; max-width: 1400px; background: white;
    border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    overflow: hidden; display: none;
  }
  .result-header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 16px 24px; background: #f8f9fc; border-bottom: 1px solid #e8eef8;
  }
  .result-header h2 { font-size: 16px; color: #2F5496; }
  .badges { display: flex; gap: 10px; align-items: center; }
  .badge { padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
  .bg-green { background: #d4edda; color: #155724; }
  .bg-red { background: #f8d7da; color: #721c24; }
  .bg-gray { background: #e9ecef; color: #495057; }

  .table-scroll { overflow-x: auto; }
  table { border-collapse: collapse; font-size: 12px; width: 100%; min-width: 900px; }
  th, td { border: 1px solid #d0d9e8; padding: 6px 10px; text-align: right; white-space: nowrap; }
  th { background: #e8eef8; color: #2F5496; font-weight: 700; text-align: center; position: sticky; top: 0; z-index: 2; }
  td:first-child, td:nth-child(2) { text-align: center; }

  /* 行底色 */
  .r1 { background: #DEEAF1; }
  .r2 { background: #E2EFDA; }
  .r3 { background: #FFF2CC; }
  .rt1 { background: #2F5496; color: white; }
  .rt2 { background: #375623; color: white; }
  .rt3 { background: #203864; color: white; }

  /* 数值着色 */
  .pos { color: #006100; }
  .neg { color: #9C0006; }
  .cpos { background: #C6EFCE !important; }
  .cneg { background: #FFC7CE !important; }
  .ndash { color: #ccc; }

  .btn-download {
    background: #70AD47; color: white; font-size: 14px; padding: 8px 20px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer;
  }
  .btn-download:hover { background: #548235; }

  .footer-note {
    padding: 12px 24px; font-size: 12px; color: #888;
    background: #f8f9fc; border-top: 1px solid #e8eef8;
  }

  @media (max-width: 600px) { .upload-area { flex-direction: column; } }
</style>
</head>
<body>

<div class="header">
  <h1>🗂️ 钢筋一二审对比表</h1>
  <p>上传两个 Excel 文件，自动生成对比表 · 支持 .xls / .xlsx</p>
</div>

<div class="upload-area">
  <div class="file-card" id="card1">
    <h3>📄 一审地下室（文件①）</h3>
    <div class="drop-zone" id="drop1" onclick="document.getElementById('inp1').click()">
      <span class="big-icon">☁️</span>
      <div class="hint">点击上传 / 拖拽文件到这里</div>
      <div class="fname" id="fname1"></div>
    </div>
    <input type="file" id="inp1" accept=".xls,.xlsx" onchange="handleFile(this,0)">
    <div class="file-info" id="info1">✅ 已加载</div>
  </div>

  <div class="file-card" id="card2">
    <h3>📄 地下室-钢筋统计汇总表（文件②）</h3>
    <div class="drop-zone" id="drop2" onclick="document.getElementById('inp2').click()">
      <span class="big-icon">☁️</span>
      <div class="hint">点击上传 / 拖拽文件到这里</div>
      <div class="fname" id="fname2"></div>
    </div>
    <input type="file" id="inp2" accept=".xls,.xlsx" onchange="handleFile(this,1)">
    <div class="file-info" id="info2">✅ 已加载</div>
  </div>
</div>

<div class="btn-row">
  <button class="btn-primary" id="btnGen" disabled onclick="generate()">🚀 生成对比表</button>
  <button class="btn-secondary" onclick="resetAll()">🔄 重置</button>
</div>

<div class="error-msg" id="errBox"></div>

<div class="result-wrap" id="resultWrap">
  <div class="result-header">
    <h2>📊 对比结果</h2>
    <div style="display:flex;gap:10px;align-items:center">
      <div class="badges" id="badges"></div>
      <button class="btn-download" id="btnDown" onclick="downloadXlsx()">📥 导出 Excel</button>
    </div>
  </div>
  <div class="table-scroll">
    <table id="tbl"></table>
  </div>
  <div class="footer-note" id="footerNote"></div>
</div>

<script src="xlsx.full.min.js"></script>
<script>
// ──────────────────────────── 状态 ────────────────────────────
let fdata = [null, null];
let fnames = ['', ''];

// ──────────────────────────── 文件处理 ────────────────────────────
function setupDragDrop(cardId, dropId, idx) {
  const card = document.getElementById(cardId);
  const drop = document.getElementById(dropId);
  ['dragenter','dragover'].forEach(ev =>
    drop.addEventListener(ev, e => { e.preventDefault(); card.classList.add('dragover'); }));
  ['dragleave','drop'].forEach(ev =>
    drop.addEventListener(ev, e => { e.preventDefault(); card.classList.remove('dragover'); }));
  drop.addEventListener('drop', e => {
    const f = e.dataTransfer.files[0];
    if (f) processFile(f, idx);
  });
}
setupDragDrop('card1','drop1',0);
setupDragDrop('card2','drop2',1);

function handleFile(inp, idx) {
  const f = inp.files[0];
  if (f) processFile(f, idx);
}

async function processFile(file, idx) {
  if (typeof XLSX === 'undefined') {
    showErr('SheetJS 库未加载，请确保 xlsx.full.min.js 与本 HTML 在同一文件夹中');
    return;
  }
  try {
    const buf = await file.arrayBuffer();
    const wb  = XLSX.read(buf, { type: 'array', cellDates: false });
    const sn  = wb.SheetNames.find(n => n.includes('钢筋统计')) || wb.SheetNames[0];
    const j   = XLSX.utils.sheet_to_json(wb.Sheets[sn], { header: 1, defval: '' });
    if (j.length < 2) throw new Error('文件数据少于2行，请确认格式');
    // 检查必须有「构件类型」列
    const header = (j[0] || []).map(h => String(h).trim());
    if (!header.includes('构件类型')) throw new Error('未找到「构件类型」列，文件格式不对');

    fdata[idx]  = j;
    fnames[idx] = file.name;

    const card = document.getElementById('card' + (idx+1));
    const fn   = document.getElementById('fname' + (idx+1));
    const info = document.getElementById('info' + (idx+1));
    card.classList.add('uploaded');
    fn.style.display = 'block';
    fn.textContent = file.name;
    info.style.display = 'flex';
    updateBtn();
  } catch(e) { showErr('文件解析失败: ' + e.message); }
}

function updateBtn() {
  document.getElementById('btnGen').disabled = !(fdata[0] && fdata[1]);
}

// ──────────────────────────── 解析 ────────────────────────────
function parse(raw) {
  const header = raw[0].map(h => String(h).trim());
  const rows   = raw.slice(1);
  const tIdx   = header.indexOf('构件类型');
  const lIdx   = header.indexOf('级别');
  const totIdx = header.indexOf('合计(t)');
  if (tIdx < 0 || totIdx < 0) return null;

  // 直径列（排除构件类型、级别、合计）
  const dIdxs = header.map((h, i) => i)
    .filter(i => i !== tIdx && i !== lIdx && i !== totIdx);
  const dHdrs = dIdxs.map(i => {
    const m = String(header[i]).match(/(\d+)/);
    return m ? parseInt(m[1]) : header[i];
  });

  const filtered = rows.filter(r => {
    const t = String(r[tIdx] || '').trim();
    return t && t !== '合计(t)' && t !== '合计';
  });

  const map = {};
  for (const row of filtered) {
    const ct = String(row[tIdx] || '').trim();
    const v  = [parseFloat(row[totIdx]) || 0, ...dIdxs.map(i => parseFloat(row[i]) || 0)];
    if (!map[ct]) map[ct] = { total: 0, diams: new Array(dIdxs.length).fill(0) };
    map[ct].total += v[0];
    for (let k = 0; k < dIdxs.length; k++) map[ct].diams[k] += v[k + 1];
  }

  return { types: Object.keys(map).sort(), map, dHdrs };
}

function compare(d1src, d2src) {
  const types = [...new Set([...Object.keys(d1src.map), ...Object.keys(d2src.map)])].sort();
  const allD  = [...new Set([...d1src.dHdrs, ...d2src.dHdrs])].sort((a,b) => Number(a)-Number(b));

  const getVals = (src, ct) => {
    if (!src.map[ct]) return { total: 0, diams: new Array(allD.length).fill(0) };
    const diams = allD.map(d => {
      const i = src.dHdrs.indexOf(d);
      return i >= 0 ? src.map[ct].diams[i] : 0;
    });
    return { total: src.map[ct].total, diams };
  };

  const dataRows = [];
  let g1 = 0, g2 = 0, gd = new Array(allD.length).fill(0);

  for (const ct of types) {
    const v1 = getVals(d1src, ct);
    const v2 = getVals(d2src, ct);
    const td = v2.diams.map((val, i) => val - v1.diams[i]);
    dataRows.push({ ct, t1: v1.total, t2: v2.total, td, d1: v1.diams, d2: v2.diams });
    g1 += v1.total; g2 += v2.total;
    for (let i=0;i<allD.length;i++) gd[i] += td[i];
  }

  return { dataRows, allD, g1, g2, gd };
}

// ──────────────────────────── 渲染 ────────────────────────────
function generate() {
  hideErr();
  if (!fdata[0] || !fdata[1]) { showErr('请先上传两个文件'); return; }
  if (typeof XLSX === 'undefined') { showErr('SheetJS 未加载，请确认 xlsx.full.min.js 在同目录'); return; }
  try {
    const p1 = parse(fdata[0]);
    const p2 = parse(fdata[1]);
    if (!p1 || !p2) { showErr('文件格式不对，缺少「构件类型」或「合计(t)」列'); return; }
    render(compare(p1, p2));
  } catch(e) { showErr('生成失败: ' + e.message); console.error(e); }
}

function render(result) {
  const { dataRows, allD, g1, g2, gd } = result;
  const f1  = fnames[0] || '一审地下室';
  const f2  = fnames[1] || '钢筋统计汇总表';
  const pct = g1 ? (g2-g1)/g1*100 : 0;

  // 只显示有数据的直径列
  const showD = allD.filter((_,i) => dataRows.some(r => r.d1[i]||r.d2[i]||r.td[i]));
  const diams  = showD.length ? showD : allD;
  const dLen   = diams.length;
  const N      = dLen;

  // ── HTML 生成 ──
  const td = (v, isDiff) => {
    if (v == null || isNaN(v)) return '<td class="ndash">-</td>';
    if (v === 0) return `<td>0</td>`;
    const sign = v > 0 ? '+' : '';
    if (isDiff) {
      const cls = v > 0 ? 'pos cpos' : 'neg cneg';
      return `<td class="${cls}">${sign}${v.toFixed(3)}</td>`;
    }
    return `<td>${sign}${v.toFixed(3)}</td>`;
  };

  let html = '';

  // 表头
  html += '<thead><tr>'; // 行1
  html += `<th rowspan="2">构件类型</th><th rowspan="2">一二审对比</th>`;
  html += `<th colspan="${N+2}">${f1}</th>`;
  html += `<th colspan="${N+2}">${f2}</th>`;
  html += `<th rowspan="2">差值</th>`;
  html += '</tr><tr>'; // 行2
  html += '<th>合计(t)</th>' + diams.map(d => `<th>${d}</th>`).join('') + '<th>合计(t)</th>';
  html += '<th>合计(t)</th>' + diams.map(d => `<th>${d}</th>`).join('') + '<th>合计(t)</th>';
  html += '</tr></thead><tbody>';

  // 数据行
  for (const row of dataRows) {
    const di = i => diams.indexOf(allD[i]);
    html += `<tr class="r1">`;
    html += `<td rowspan="3"><b>${row.ct}</b></td>`;
    html += `<td>${f1}</td>`;
    html += td(row.t1) + diams.map((_,i) => td(row.d1[di(i)])).join('');
    html += td(row.t1);
    html += `<td rowspan="3">${td(row.t2 - row.t1, true)}</td>`;
    html += `</tr>`;

    html += `<tr class="r2">`;
    html += `<td>${f2}</td>`;
    html += td(row.t2) + diams.map((_,i) => td(row.d2[di(i)])).join('');
    html += td(row.t2);
    html += `</tr>`;

    html += `<tr class="r3">`;
    html += `<td>差值</td>`;
    html += td(row.t2 - row.t1, true) + diams.map((_,i) => td(row.td[di(i)], true)).join('');
    html += td(row.t2 - row.t1, true);
    html += `</tr>`;
  }

  // 合计行
  const gDiff = g2 - g1;
  const gCls  = gDiff >= 0 ? 'pos cpos' : 'neg cneg';

  // 合计第1行
  html += `<tr class="rt1">`;
  html += `<td rowspan="3"><b>合计</b></td>`;
  html += `<td>${f1}</td>`;
  html += `<td>${g1.toFixed(3)}</td>`;
  html += diams.map((_,i) => {
    const v = dataRows.reduce((s,r) => s + r.d1[diams.indexOf(allD[i])], 0);
    return `<td>${v.toFixed(3)}</td>`;
  }).join('');
  html += `<td>${g1.toFixed(3)}</td>`;
  html += `<td rowspan="3" class="${gCls}">${gDiff>=0?'+':''}${gDiff.toFixed(3)}</td>`;
  html += `</tr>`;

  // 合计第2行
  html += `<tr class="rt2">`;
  html += `<td>${f2}</td>`;
  html += `<td>${g2.toFixed(3)}</td>`;
  html += diams.map((_,i) => {
    const v = dataRows.reduce((s,r) => s + r.d2[diams.indexOf(allD[i])], 0);
    return `<td>${v.toFixed(3)}</td>`;
  }).join('');
  html += `<td>${g2.toFixed(3)}</td>`;
  html += `</tr>`;

  // 合计第3行（差值）
  html += `<tr class="rt3">`;
  html += `<td>差值</td>`;
  html += `<td class="${gCls}">${gDiff>=0?'+':''}${gDiff.toFixed(3)}</td>`;
  html += diams.map((_,i) => td(gd[diams.indexOf(allD[i])], true)).join('');
  html += `<td class="${gCls}">${gDiff>=0?'+':''}${gDiff.toFixed(3)}</td>`;
  html += `</tr>`;

  html += '</tbody>';
  document.getElementById('tbl').innerHTML = html;

  // Badges
  const diffCnt = dataRows.filter(r => r.td.some(v => v !== 0)).length;
  document.getElementById('badges').innerHTML =
    `<span class="badge bg-gray">构件: ${dataRows.length} 个</span>` +
    `<span class="badge bg-gray">差异: ${diffCnt} 个</span>` +
    `<span class="badge ${gDiff>=0?'bg-green':'bg-red'}">总差值: ${gDiff>=0?'+':''}${gDiff.toFixed(3)} t (${pct>=0?'+':''}${pct.toFixed(2)}%)</span>`;

  document.getElementById('footerNote').textContent =
    `生成: ${new Date().toLocaleString('zh-CN')}　|　一审 = ${g1.toFixed(3)} t　二审 = ${g2.toFixed(3)} t`;

  const wrap = document.getElementById('resultWrap');
  wrap.style.display = 'block';
  wrap.scrollIntoView({ behavior: 'smooth', block: 'start' });

  // 保存渲染数据，供导出使用
  window._lastResult = result;
}

// ──────────────────────────── 工具 ────────────────────────────
function showErr(msg) {
  const el = document.getElementById('errBox');
  el.textContent = '⚠️ ' + msg;
  el.style.display = 'block';
}
function hideErr() { document.getElementById('errBox').style.display = 'none'; }

function downloadXlsx() {
  const r = window._lastResult;
  if (!r) { showErr('请先生成对比表'); return; }
  if (typeof XLSX === 'undefined') { showErr('SheetJS 未加载'); return; }

  const { dataRows, allD, g1, g2, gd } = r;
  const f1 = fnames[0] || '一审地下室';
  const f2 = fnames[1] || '钢筋统计汇总表';

  const fDiams = allD.filter((_,i) => dataRows.some(row => row.d1[i]||row.d2[i]||row.td[i]));
  const diams  = fDiams.length ? fDiams : allD;
  const N      = diams.length;
  const gDiff  = g2 - g1;
  const dii    = i => diams.indexOf(allD[i]);

  const bg = {
    r1:'FFDEEAF1', r2:'FFE2EFDA', r3:'FFFFF2CC',
    rt1:'FF2F5496', rt2:'FF375623', rt3:'FF203864',
  };


  const wsData = [];

  // 表头行1
  wsData.push(['构件类型','对比', f1, ...Array(N+1).fill(''), '差值']);
  // 表头行2
  wsData.push(['','','合计(t)',...diams.map(String),'合计(t)']);

  // 数据行: 一审数据 + 差值（去掉二审列），每行共 N+4 列
  for (const row of dataRows) {
    const diff = row.t2 - row.t1;
    wsData.push([row.ct, f1, row.t1, ...diams.map((_,i)=>row.d1[dii(i)]), row.t1, diff]);
    wsData.push(['',     f2, row.t2, ...diams.map((_,i)=>row.d2[dii(i)]), row.t2, diff]);
    wsData.push(['',  '差值', diff, ...diams.map((_,i)=>row.td[dii(i)]), diff, diff]);
  }

  // 合计3行
  wsData.push(['合计',f1,g1,...diams.map((_,i)=>dataRows.reduce((s,r)=>s+r.d1[dii(i)],0)),g1,gDiff]);
  wsData.push(['',   f2,g2,...diams.map((_,i)=>dataRows.reduce((s,r)=>s+r.d2[dii(i)],0)),g2,gDiff]);
  wsData.push(['', '差值',gDiff,...diams.map((_,i)=>gd[dii(i)]),gDiff,gDiff]);

const ws = XLSX.utils.aoa_to_sheet(wsData);

  // 列宽
  ws['!cols'] = [
    {wch:14},{wch:24},
    ...diams.map(()=>({wch:10})),
    {wch:10},{wch:13},
  ];

  // A列合并
  const merges = [];
  let rn = 2; // 数据从row index 2开始（0-based）
  for (const row of dataRows) {
    merges.push({s:{r:rn,c:0},e:{r:rn+2,c:0}});
    rn += 3;
  }
  merges.push({s:{r:rn,c:0},e:{r:rn+2,c:0}});
  ws['!merges'] = merges;

  // 差值列着色：每构件第3行(=r3)为差值行，负数红字
  // wsData: 行2=第1构件r1, 行3=r2, 行4=r3(差值)，行5=第2构件r1...
  for (let ri = 2; ri < wsData.length; ri++) {
    const rowIdx = (ri - 2) % 3; // 0=r1, 1=r2, 2=r3
    if (rowIdx !== 2) continue; // 只给差值行着色
    for (let ci = 0; ci < wsData[ri].length; ci++) {
      const v = wsData[ri][ci];
      if (typeof v === 'number' && v !== 0) {
        const ref = XLSX.utils.encode_cell({r:ri, c:ci});
        ws[ref].s = {
          fill: { fgColor: { rgb: v > 0 ? 'FFC6EFCE' : 'FFFFC7CE' } },
          font:  { color: { rgb: v > 0 ? 'FF006100' : 'FF9C0006' }, bold: true },
        };
      }
    }
  }

  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, '钢筋对比表');
  XLSX.writeFile(wb, '钢筋一二审对比表.xlsx');
}

function resetAll() {
  fdata = [null, null]; fnames = ['',''];
  document.getElementById('inp1').value = '';
  document.getElementById('inp2').value = '';
  ['card1','card2'].forEach((id,i) => {
    document.getElementById(id).classList.remove('uploaded','dragover');
    document.getElementById('fname'+(i+1)).style.display = 'none';
    document.getElementById('info'+(i+1)).style.display   = 'none';
  });
  document.getElementById('btnGen').disabled = true;
  document.getElementById('resultWrap').style.display = 'none';
  window._lastResult = null;
  hideErr();
}
</script>
